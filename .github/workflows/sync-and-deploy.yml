name: Sync Content & Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [content-updated]
  schedule:
    - cron: '0 2 * * *' # nightly fallback sync at 02:00 UTC
  workflow_dispatch:

# Required for the GitHub Pages deployment action
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      # Mint an installation token for the OpenSDEPrep GitHub App. With `owner`
      # set and no `repositories`, the token can access every repo the app is
      # installed on — so new topic repos work with no workflow change.
      # Requires org (or repo) secrets: SYNC_APP_ID, SYNC_APP_PRIVATE_KEY.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # --- Checkout each topic repo into a staging dir ---
      - name: Checkout LLD content
        uses: actions/checkout@v4
        with:
          repository: OpenSDEPrep/lld
          path: _sync/lld
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout DSA content
        uses: actions/checkout@v4
        with:
          repository: OpenSDEPrep/dsa
          path: _sync/dsa
          token: ${{ steps.app-token.outputs.token }}
        continue-on-error: true # topic repo may not exist yet

      # Add the remaining topic repos here as they come online:
      # hld, frontend, devops, lang-runtime — same block, swapping the name.

      - name: Sync content and roadmap directories
        run: |
          set -e
          for topic in dsa lld hld frontend devops lang-runtime; do
            if [ -d "_sync/$topic/content" ]; then
              mkdir -p "src/content/$topic"
              rsync -av --delete "_sync/$topic/content/"  "src/content/$topic/"
            fi
            if [ -d "_sync/$topic/roadmaps" ]; then
              mkdir -p "src/roadmaps/$topic"
              rsync -av --delete "_sync/$topic/roadmaps/" "src/roadmaps/$topic/"
            fi
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (Astro + Pagefind)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

<!--
  OpenSDEPrep monogram — mark only (no wordmark), compact variant.
  Use in nav, small contexts, and as base for favicon generation.
  48×48 canvas, brand-gradient mark on near-black tile.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="OpenSDEPrep">
  <defs>
    <linearGradient id="brand-grad-mono" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- tile background -->
  <rect width="48" height="48" rx="11" fill="#111827"/>
  <!-- left curly brace -->
  <path d="M17 10 C14.5 10 14 10.5 14 12 L14 16 C14 17.5 12.5 18 12 19 C12.5 20 14 20.5 14 22 L14 26 C14 27.5 14.5 28 17 28"
        stroke="url(#brand-grad-mono)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- right curly brace -->
  <path d="M31 10 C33.5 10 34 10.5 34 12 L34 16 C34 17.5 35.5 18 36 19 C35.5 20 34 20.5 34 22 L34 26 C34 27.5 33.5 28 31 28"
        stroke="url(#brand-grad-mono)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- two paths converging -->
  <path d="M21 30 L21 26 L24 21 L27 26 L27 30"
        stroke="url(#brand-grad-mono)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- up-arrow tip -->
  <path d="M22 23 L24 18 L26 23"
        stroke="url(#brand-grad-mono)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Tagline "OSDE" in mono below (optional, clean) -->
  <text x="24" y="42" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600"
        letter-spacing="0.1em" fill="#6B7280" text-anchor="middle">OSDE</text>
</svg>

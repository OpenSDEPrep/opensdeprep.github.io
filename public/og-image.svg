<!--
  OpenSDEPrep OG / social image template
  Standard OG dimensions: 1200×630 px.
  Rendered as SVG; convert to PNG for production use (e.g., via satori or puppeteer).
  Design: dark tile with brand gradient mark, wordmark, and tagline.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="OpenSDEPrep — Open-source SDE interview prep">
  <defs>
    <linearGradient id="og-bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="og-brand-grad" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="og-accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg-grad)"/>

  <!-- Subtle grid overlay -->
  <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M60 0 L0 0 0 60" fill="none" stroke="#1F2937" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Brand accent line at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#og-accent-line)"/>

  <!-- Mark — large version centered-left -->
  <g transform="translate(100, 180)">
    <!-- mark tile -->
    <rect width="200" height="200" rx="36" fill="#1F2937"/>
    <!-- left curly brace -->
    <path d="M62 40 C52 40 50 42 50 48 L50 72 C50 80 44 84 42 90 C44 96 50 100 50 108 L50 132 C50 138 52 140 62 140"
          stroke="url(#og-brand-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- right curly brace -->
    <path d="M138 40 C148 40 150 42 150 48 L150 72 C150 80 156 84 158 90 C156 96 150 100 150 108 L150 132 C150 138 148 140 138 140"
          stroke="url(#og-brand-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- two converging paths -->
    <path d="M78 148 L78 122 L100 90 L122 122 L122 148"
          stroke="url(#og-brand-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- up-arrow tip -->
    <path d="M86 104 L100 72 L114 104"
          stroke="url(#og-brand-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <text x="340" y="270" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700"
        letter-spacing="-0.04em" fill="#F9FAFB">OpenSDEPrep</text>

  <!-- Tagline -->
  <text x="340" y="330" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400"
        letter-spacing="-0.01em" fill="#6B7280">Open-source SDE interview prep &amp; engineering learning hub</text>

  <!-- Bottom tag chips -->
  <g transform="translate(340, 390)">
    <!-- System Design chip -->
    <rect width="164" height="36" rx="18" fill="#1F2937" stroke="#374151" stroke-width="1"/>
    <text x="82" y="23" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600"
          letter-spacing="0.04em" fill="#6B7280" text-anchor="middle">LLD / HLD</text>
    <!-- DSA chip -->
    <rect x="176" width="100" height="36" rx="18" fill="#1F2937" stroke="#374151" stroke-width="1"/>
    <text x="226" y="23" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600"
          letter-spacing="0.04em" fill="#6B7280" text-anchor="middle">DSA</text>
    <!-- Behavioral chip -->
    <rect x="288" width="148" height="36" rx="18" fill="#1F2937" stroke="#374151" stroke-width="1"/>
    <text x="362" y="23" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600"
          letter-spacing="0.04em" fill="#6B7280" text-anchor="middle">Behavioral</text>
    <!-- Open source chip -->
    <rect x="448" width="152" height="36" rx="18" fill="#1F2937" stroke="#374151" stroke-width="1"/>
    <text x="524" y="23" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600"
          letter-spacing="0.04em" fill="#6B7280" text-anchor="middle">Open Source</text>
  </g>

  <!-- GitHub URL watermark -->
  <text x="100" y="598" font-family="JetBrains Mono, monospace" font-size="18" font-weight="400"
        letter-spacing="0.02em" fill="#374151">github.com/OpenSDEPrep</text>
</svg>
